<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClientVortex // AI Proposal Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                ClientVortex
            </h1>
            <p class="text-slate-400 mt-2 text-sm">Generate high-converting freelance proposals instantly</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                <h2 class="text-lg font-bold mb-4 text-blue-400">Prospect Details</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Business Name</label>
                        <input type="text" id="bizName" placeholder="e.g., Nexus Digital" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Service to Offer</label>
                        <select id="serviceType" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
                            <option value="Social Media Management">Social Media Management</option>
                            <option value="Copywriting & Content">Copywriting & Content</option>
                            <option value="Website Creation">Website Creation</option>
                            <option value="Lead Generation">Lead Generation</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Observed Weakness / Pain Point</label>
                        <textarea id="painPoint" rows="3" placeholder="e.g., Instagram hasn't been updated in 3 months; website layout is completely outdated..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition resize-none"></textarea>
                    </div>

                    <button onclick="generateProposal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 px-4 rounded-lg text-sm shadow-lg transition duration-200 mt-2">
                        Generate Pitch
                    </button>
                </div>
            </div>

            <div class="flex flex-col bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-indigo-400">Your AI Proposal</h2>
                    <button onclick="copyToClipboard()" class="text-xs bg-slate-700 hover:bg-slate-600 px-2.5 py-1 rounded text-slate-300 font-medium transition">
                        Copy Code
                    </button>
                </div>
                
                <div id="outputBox" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-4 text-sm text-slate-300 overflow-y-auto whitespace-pre-line min-h-[200px]">
                    Your customized, persuasive client pitch will display here...
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateProposal() {
            const name = document.getElementById('bizName').value || "the company";
            const service = document.getElementById('serviceType').value;
            const weakness = document.getElementById('painPoint').value || "growing their online brand presence";

            const pitchTemplate = `Hi Team ${name},\n\nI was looking over your digital platforms recently and noticed a massive opportunity. Specifically, I saw that ${weakness}.\n\nLeaving this unoptimized means you are actively missing out on inbound customers who are finding your competitors instead. \n\nI specialize in ${service}, and I can fix this for you by creating a streamlined campaign to capture those lost leads. Are you open to a quick 5-minute call this week to see a mock-up blueprint I built for you?\n\nBest regards,\n[Your Name]`;

            document.getElementById('outputBox').innerText = pitchTemplate;
        }

        function copyToClipboard() {
            const text = document.getElementById('outputBox').innerText;
            navigator.clipboard.writeText(text);
            alert('Proposal copied to clipboard!');
        }
    </script>
</body>
</html>
